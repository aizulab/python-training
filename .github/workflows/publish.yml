name: ビルドして HTML 形式で出力し、GitHub Pages で公開する

on:
  push:
    branches:
      - main
      - deploy-pages-sans-branch  # TODO: あとで消す

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3

      - name: ビルド
        uses: ./.github/actions/build

      - name: ビルドした成果物 (HTML) を GitHub Pages にアップロード
        uses: actions/upload-artifact@v1
        with:
          name: github-pages
          path: ./build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      # `id: deployment` ステップの出力結果を利用
      url: ${{ steps.deployment.outputs.page_url }}

    # 必要な権限等については https://github.com/actions/deploy-pages を参照
    permissions:
      pages: write
      id-token: write

    steps:
      - name: アップロードした成果物をデプロイして公開
        id: deployment
        uses: actions/deploy-pages@v1
